<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspadinha Açaístel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #1c022b url('https://www.transparenttextures.com/patterns/stardust.png');
        }
        .card {
            width: 350px;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }
        h1 { color: #ffcc66; margin-bottom: 5px; }
        .scratch-wrapper {
            position: relative;
            width: 300px;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px auto;
            background: #fff; /* Fundo onde o prêmio aparece */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #prize-text {
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
            position: absolute;
            z-index: 1;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: crosshair;
        }
        #btn {
            background: linear-gradient(to bottom, #6a0dad, #3c096c);
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #btn:disabled { background: #555; cursor: not-allowed; }
        .whatsapp {
            display: none;
            margin-top: 15px;
            background: #25d366;
            padding: 14px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Raspadinha Açaístel</h1>
    <p>Raspe e concorra a <b>Açaí grátis</b><br>1 chance por dia</p>

    <div class="scratch-wrapper">
        <div id="prize-text">Carregando...</div>
        <canvas id="scratch" width="300" height="180"></canvas>
    </div>

    <div id="result"></div>
    <button id="btn">REVELAR PRÊMIO</button>
    <a id="zap" class="whatsapp" target="_blank">RESGATAR PRÊMIO</a>
</div>
